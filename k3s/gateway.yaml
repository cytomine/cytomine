apiVersion: v1
kind: Namespace
metadata:
  name: gateway-system
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cilium
  namespace: kube-system
spec:
  repo: https://helm.cilium.io/
  chart: cilium
  targetNamespace: kube-system
  valuesContent: |-
    gatewayAPI:
      enabled: true
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 6443
