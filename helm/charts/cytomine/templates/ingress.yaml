apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Release.Namespace }}
  name: core
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-origin: '{{ include "core.url" . }}'
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.global.domainName }}
      http:
        paths:
          - path: /server
            pathType: Prefix
            backend:
              service:
                name: core
                port:
                  number: {{ .Values.core.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: core
                port:
                  number: {{ .Values.core.port }}
          - path: /iam
            pathType: Prefix
            backend:
              service:
                name: iam
                port:
                  number: {{ .Values.iam.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: {{ .Values.web_ui.port }}
  tls:
  - hosts:
    - {{ include "core.hostname" . }}
    secretName: ingress-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Release.Namespace }}
  name: pims
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.global.domainName }}
      http:
        paths:
          - path: /ims(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pims
                port:
                  number: {{ .Values.pims.port }}
  tls:
  - hosts:
    - {{ include "core.hostname" . }}
    secretName: ingress-tls
---
