name: CBIR

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    working-directory: ./cbir

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Set up the repository
        uses: actions/checkout@v6.0.2

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ steps.versions.outputs.python-version }}
          version: ${{ steps.versions.outputs.uv-version }}

      - name: Install test dependencies
        run: uv sync --group test

      - name: Pull test images
        run: |
          docker pull registry.cytomine.org/docker/redis:7.2

      - name: Run tests
        run: uv run pytest
        env:
          DATA_PATH: ./
          PROXY_CACHE: registry.cytomine.org/docker/
          TESTCONTAINERS_RYUK_DISABLED: true
          WEIGHTS: ./weights/resnet
