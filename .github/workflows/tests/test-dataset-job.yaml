apiVersion: batch/v1
kind: Job
metadata:
  name: test-dataset-loader
spec:
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 20000
        runAsGroup: 20000
        fsGroup: 20000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-image
          image: registry.cytomine.org/docker/library/alpine:3.18
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              echo "Waiting for wsi..."
              until [ -f /tmp/images/wsi ]; do sleep 2; done
              echo "wsi found!"
          volumeMounts:
            - mountPath: /tmp/images
              name: image-staging
      containers:
        - name: loader
          image: registry.cytomine.org/docker/library/alpine:3.18
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              mkdir -p /data/dataset/test-project/IMAGES
              mkdir -p /data/dataset/test-project/METADATA
              cp /tmp/metadata/dataset.xml /data/dataset/test-project/METADATA/dataset.xml
              cp /tmp/metadata/image.xml /data/dataset/test-project/METADATA/image.xml
              cp /tmp/metadata/observation.xml /data/dataset/test-project/METADATA/observation.xml
              cp /tmp/metadata/observer.xml /data/dataset/test-project/METADATA/observer.xml
              cp /tmp/metadata/sample.xml /data/dataset/test-project/METADATA/sample.xml
              cp /tmp/metadata/staining.xml /data/dataset/test-project/METADATA/staining.xml
              cp /tmp/metadata/policy.xml /data/dataset/test-project/METADATA/policy.xml
              cp -r /tmp/images/wsi /data/dataset/test-project/IMAGES/wsi
          volumeMounts:
            - mountPath: /data
              name: dataset-pvc
            - mountPath: /tmp/metadata
              name: dataset-metadata
            - mountPath: /tmp/images
              name: image-staging
      volumes:
        - name: dataset-pvc
          persistentVolumeClaim:
            claimName: test-dataset-pvc
        - name: dataset-metadata
          projected:
            sources:
              - configMap:
                  name: test-dataset-metadata
              - configMap:
                  name: test-dataset-metadata-image
              - configMap:
                  name: test-dataset-metadata-observation
              - configMap:
                  name: test-dataset-metadata-observer
              - configMap:
                  name: test-dataset-metadata-policy
              - configMap:
                  name: test-dataset-metadata-sample
              - configMap:
                  name: test-dataset-metadata-staining
        - name: image-staging
          emptyDir: {}
