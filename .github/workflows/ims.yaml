name: IMS

on:
  workflow_call:
    secrets:
      BIGPICTURE_SSH_KEY:
        required: true

permissions:
  contents: read

jobs:
  tests:
    runs-on: self-hosted

    steps:
      - name: Set up the repository
        uses: actions/checkout@v6.0.3

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Install system dependencies
        run: |
          sudo apt-get -y update && \
          sudo apt-get -y install --no-install-recommends --no-install-suggests \
            libimage-exiftool-perl \
            libopenslide-dev \
            libopenjp2-7-dev \
            libvips42 \
            libpng-dev

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BIGPICTURE_SSH_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ steps.versions.outputs.python-version }}
          version: ${{ steps.versions.outputs.uv-version }}

      - name: Run tests
        run: uv --directory ./pims run pytest tests
        env:
          CONFIG_FILE: ./tests/pims-config.env
