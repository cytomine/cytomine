{{- if not .Values.gateway.parentRefs }}
{{- $secretObj := (lookup "v1" "Secret" .Release.Namespace "gateway-tls") | default dict }}
{{- $secretData := (get $secretObj "data") | default dict }}
{{- $existingCrt := get $secretData "tls.crt" }}
{{- $existingKey := get $secretData "tls.key" }}
{{- $cert := genSelfSignedCert .Values.global.domainName nil (list .Values.global.domainName) 3650 }}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cytomine.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $existingCrt | default ($cert.Cert | b64enc) }}
  tls.key: {{ $existingKey | default ($cert.Key | b64enc) }}
{{- end }}
