name: Web UI

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    working-directory: ./web-ui

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - name: Set up the repository
        uses: actions/checkout@v7.0.0

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Set up NodeJS
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.versions.outputs.node-version }}

      - name: Install Dependencies
        run: npm ci

      - name: Check lint
        run: npm run lint

  unit-tests:
    runs-on: self-hosted
    steps:
      - name: Set up the repository
        uses: actions/checkout@v7.0.0

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Set up NodeJS
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.versions.outputs.node-version }}

      - name: Install Dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Upload test coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./web-ui/coverage
          retention-days: 7
