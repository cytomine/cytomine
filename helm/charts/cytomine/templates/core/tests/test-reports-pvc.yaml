apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "e2e-test-reports"
  labels:
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
