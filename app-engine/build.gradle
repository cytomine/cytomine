plugins {
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
    id 'org.liquibase.gradle' version '2.2.0'
}

bootJar {
    archiveFileName = 'cytomine-app-engine.jar'
}

group = 'be.cytomine'
version = 'ce-0.0.0-SNAPSHOT' // do not modify this, it will be replace during build (ci)

configurations {
    liquibaseRuntime.extendsFrom runtimeClasspath
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenLocal()
    maven {
        url "https://maven.dcm4che.org/"
    }
}

springBoot {
    mainClass = "be.cytomine.appengine.AppEngineApplication"
}

dependencies {
    // Lombok & MapStruct
    implementation "org.mapstruct:mapstruct:${rootProject.ext.mapstructVersion}", "org.projectlombok:lombok:${rootProject.ext.lombokVersion}"
    annotationProcessor "org.mapstruct:mapstruct-processor:${rootProject.ext.mapstructVersion}", "org.projectlombok:lombok:${rootProject.ext.lombokVersion}", "org.projectlombok:lombok-mapstruct-binding:${rootProject.ext.lombokMapstructBindingVersion}"

    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    implementation ('org.springframework.boot:spring-boot-starter-web') {
        // https://github.com/networknt/json-schema-validator/issues/1207
        // https://spring.io/blog/2025/10/07/introducing-jackson-3-support-in-spring#keep-using-jackson-2-support-temporarily
        exclude group:'org.springframework.boot', module:'spring-boot-jackson'
    }
    implementation 'org.springframework.boot:spring-boot-jackson2'
    implementation 'com.fasterxml.jackson.core:jackson-annotations'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    compileOnly("org.springframework.boot:spring-boot-devtools")

    implementation group: 'com.networknt', name: 'json-schema-validator', version: '1.0.87'
    implementation group: 'org.apache.commons', name: 'commons-compress', version: '1.24.0'
    implementation group: 'org.apache.tika', name: 'tika-core', version: '2.9.1'
    implementation 'org.apache.commons:commons-fileupload2-jakarta-servlet6:2.0.0-M4'
    implementation 'commons-io:commons-io:2.15.1'
    // Geometry
    implementation "org.locationtech.jts:jts-core:${rootProject.ext.jtsVersion}"
    implementation "org.locationtech.jts.io:jts-io-common:${rootProject.ext.jtsVersion}"

    // Hibernate
    implementation "org.hibernate:hibernate-core:${rootProject.ext.hibernateVersion}"
    implementation "org.hibernate:hibernate-spatial:${rootProject.ext.hibernateVersion}"


    // Jakarta
    implementation 'jakarta.persistence:jakarta.persistence-api'
    implementation 'jakarta.servlet:jakarta.servlet-api'

    // PostgreSQL
    runtimeOnly 'org.postgresql:postgresql'

    // Kubernetes
    implementation 'io.fabric8:kubernetes-client:6.10.0'
    implementation 'org.bouncycastle:bcprov-jdk15on:1.59'
    implementation 'org.bouncycastle:bcpkix-jdk15on:1.59'

    // Test dependencies
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'

    // Cucumber dependencies
    implementation group: 'io.cucumber', name: 'cucumber-spring', version: '6.10.4'
    testImplementation 'io.cucumber:cucumber-java:6.10.4'
    testImplementation 'io.cucumber:cucumber-junit:6.10.4'
    // assertj-core and junit-jupiter are defined in root build.gradle
    testImplementation 'org.junit.vintage:junit-vintage-engine'

    // registry client
    implementation project(':registry-client')

    // liquibase
    liquibaseRuntime 'info.picocli:picocli:4.7.5'
    implementation "org.liquibase:liquibase-core:${rootProject.ext.liquibaseVersion}"

    // Image processing
    implementation 'org.apache.commons:commons-imaging:1.0.0-alpha5'
    implementation 'org.dcm4che:dcm4che-core:5.31.0'

    testImplementation "org.springframework.boot:spring-boot-testcontainers"
    testImplementation "org.testcontainers:testcontainers-junit-jupiter"
    testImplementation 'com.google.cloud.tools:jib-core:0.27.3'
    testImplementation "org.testcontainers:testcontainers-postgresql:${rootProject.ext.testcontainersVersion}"
    testImplementation "org.testcontainers:testcontainers:${rootProject.ext.testcontainersVersion}"
    testImplementation "org.testcontainers:testcontainers-k3s:${rootProject.ext.testcontainersVersion}"
}

test {
    finalizedBy jacocoTestReport // report is always generated after tests run
}

jacocoTestReport {
    dependsOn test
}

// Cucumber as a test implementation
configurations {
    cucumberRuntime {
        extendsFrom testImplementation
    }
}

// run cucumber to verify features
tasks.register('cucumber') {
    group "verification"
    dependsOn assemble, testClasses
    doLast {
        javaexec {
            main = "io.cucumber.core.cli.Main"
            classpath = configurations.cucumberRuntime + sourceSets.main.output + sourceSets.test.output
            args = ['--plugin', 'pretty', '--glue', 'be.cytomine.appengine', 'src/test/resources']
        }
    }
}
