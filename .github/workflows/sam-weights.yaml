---
name: SAM weights image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - sam/Dockerfile.weights

permissions:
  contents: read

jobs:
  build-push:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=registry.cytomine.org/docker/moby/buildkit:buildx-stable-1
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["registry.cytomine.org/docker/"]

      - name: Log in to Cytomine registry
        uses: docker/login-action@v4
        with:
          registry: registry.cytomine.org
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: sam
          file: sam/Dockerfile.weights
          push: true
          tags: registry.cytomine.org/cytomine/sam-weights:latest
          allow: network.host
          network: host
