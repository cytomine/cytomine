apiVersion: v1
kind: Pod
metadata:
  name: "e2e-tests"
  labels:
  annotations:
    "helm.sh/hook": test
spec:
  securityContext:
  {{- include "cytomine.podSecurityContext" . | nindent 4 }}
  volumes:
    - name: tmp
      emptyDir: {}
    - name: workspace
      emptyDir: {}
  initContainers:
    - name: wait-for-selenium
      image: busybox
      securityContext:
      {{- include "cytomine.containerSecurityContext" . | nindent 8 }}
      command:
        - sh
        - -c
        - |
          timeout=60; elapsed=0;
          until nc -z selenium.{{ .Release.Namespace }}.svc.cluster.local 4444; do
            if [ "$elapsed" -ge "$timeout" ]; then echo "Timed out waiting for Selenium"; exit 1; fi;
            echo "Waiting for Selenium... ($elapsed s)"; sleep 2; elapsed=$((elapsed+2));
          done
  containers:
    - name: e2e-tests
      image: "{{ .Values.images.e2e_tests }}"
      securityContext:
      {{- include "cytomine.containerSecurityContext" . | nindent 8 }}
      volumeMounts:
      - name: tmp
        mountPath: /tmp/gradle
      - name: workspace
        mountPath: /workspace
      env:
        - name: CYTOMINE_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cytomine-admin-iam-secret
              key: password
        - name: CYTOMINE_ADMIN_USERNAME
          value: admin
        - name: CYTOMINE_URL
          value: http://core.{{ .Release.Namespace }}.svc.cluster.local
        - name: SELENIUM_URL
          value: http://selenium.{{ .Release.Namespace }}.svc.cluster.local:4444
  restartPolicy: Never
