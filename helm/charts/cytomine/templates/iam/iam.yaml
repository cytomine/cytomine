apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam
  labels:
    app: iam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iam
  template:
    metadata:
      labels:
        app: iam
      annotations:
        checksum/config: "{{ include (print $.Template.BasePath "/iam/iam-config.yaml") . | sha256sum }}"
    spec:
      serviceAccountName: {{ include "cytomine.serviceAccountName" . }}
      securityContext:
      {{- include "cytomine.podSecurityContext" . | nindent 8 }}
      volumes:
      - name: keystore
        emptyDir: {}
      - name: opt-keycloak
        emptyDir: {}
      - name: tmp-keycloak
        emptyDir: {}
      initContainers:
      - name: wait-for-postgres
        image: "{{ .Values.images.postgresql_iam }}"
        securityContext:
        {{- include "cytomine.containerSecurityContext" . | nindent 10 }}
        env:
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-iam-secret
                key: password
        command:
          - /bin/sh
          - -c
          - |
            echo "Waiting for postgres-iam to be ready..."
            until pg_isready -h postgres-iam.{{ .Release.Namespace }}.svc.cluster.local -p 5432 -U iam; do
              echo "postgres-iam not ready, retrying in 2s..."
              sleep 2
            done

      - name: iam-init
        image: {{ .Values.images.iam }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        securityContext:
        {{- include "cytomine.containerSecurityContext" . | nindent 10 }}
        volumeMounts:
          - name: opt-keycloak
            mountPath: "/tmp"
        command:
          - /bin/sh
          - -c
          - >
            set -x;
            cp -r /opt/keycloak/* /tmp/;
        resources:
          {{- toYaml .Values.postgresql.resources | nindent 12 }}

      - name: certificates-provider
        securityContext:
        {{- include "cytomine.containerSecurityContext" . | nindent 10 }}
        image: {{ .Values.images.eclipse_temurin }}
        command: ['sh', '-c', '[ -f /keystore/server.keystore ] || keytool -genkeypair -alias localhost -keyalg RSA -keysize 2048 -validity 365 -keystore /keystore/server.keystore -dname "cn=Server Administrator,o=Acme,c=GB" -keypass password -storepass password']
        volumeMounts:
        - name: keystore
          mountPath: "/keystore"

      containers:
      - name: iam
        securityContext:
        {{- include "cytomine.containerSecurityContext" . | nindent 10 }}
        image: {{ .Values.images.iam }}
        ports:
        - containerPort: {{ .Values.iam.port }}
        command:
        - "/opt/keycloak/bin/kc.sh"
        - "start"
        # Uncomment next line to print debug logs
        # - "--log-level=DEBUG"
        envFrom:
        - configMapRef:
            name: iam
        env:
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-iam-secret
              key: password
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: admin-iam-secret
              key: password
        - name: KC_KEYSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: admin-iam-secret
              key: password
        startupProbe:
          httpGet:
            path: /iam/health/live
            scheme: HTTPS
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - /opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:{{ .Values.iam.port }}/iam --realm master --user admin --password $KC_BOOTSTRAP_ADMIN_PASSWORD --config /tmp/probe.config
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 10
        livenessProbe:
          httpGet:
            path: /iam/health/live
            scheme: HTTPS
            port: 9000
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5

        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "12Gi"
            cpu: "4"
        volumeMounts:
        - name: opt-keycloak
          mountPath: "/opt/keycloak"
        - name: tmp-keycloak
          mountPath: "/tmp"
        - name: keystore
          mountPath: "/opt/keycloak/conf/server.keystore"
          subPath: "server.keystore"
