name: Docker push Helm package

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./helm

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Get version
        run: |
          echo "CHART_VERSION=$(cat ./charts/cytomine/Chart.yaml | grep "^version:" | sed -E 's/^version: (.*)$/\1/g')" >> $GITHUB_ENV

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Helm login to proxy registry
        run: helm registry login -u ${{ secrets.REGISTRY_USERNAME }} -p ${{ secrets.REGISTRY_TOKEN }} registry.cytomine.org

      - name: Update dependencies to use proxy registry
        run: sed -i 's|oci://docker.io/|oci://registry.cytomine.org/docker/|g' ./charts/cytomine/Chart.yaml

      - name: Helm dependency build
        run: helm dependency build ./charts/cytomine

      - name: Restore Chart.yaml
        run: git checkout -- charts/cytomine/Chart.yaml

      - name: Helm package
        run: helm package ./charts/cytomine

      - name: Helm login
        run: helm registry login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }} registry-1.docker.io

      - name: Helm push
        run: helm push cytomine-helm-${{ env.CHART_VERSION }}.tgz oci://registry-1.docker.io/cytomine
