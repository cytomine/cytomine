name: Load Versions
description: Reads tooling versions from .github/versions.yaml

outputs:
  java-version:
    description: Java version
    value: ${{ steps.read.outputs.java-version }}
  java-distribution:
    description: Java distribution
    value: ${{ steps.read.outputs.java-distribution }}
  gradle-version:
    description: Gradle version
    value: ${{ steps.read.outputs.gradle-version }}
  node-version:
    description: Node version
    value: ${{ steps.read.outputs.node-version }}
  python-version:
    description: Python version
    value: ${{ steps.read.outputs.python-version }}
  uv-version:
    description: uv version
    value: ${{ steps.read.outputs.uv-version }}

runs:
  using: composite
  steps:
    - name: Read versions
      id: read
      shell: bash
      run: |
        FILE=".github/versions.yaml"

        parse() {
          grep "^$1:" $FILE | sed 's/.*: //' | tr -d '"'
        }

        echo "java-version=$(parse java-version)" >> $GITHUB_OUTPUT
        echo "java-distribution=$(parse java-distribution)" >> $GITHUB_OUTPUT
        echo "gradle-version=$(parse gradle-version)" >> $GITHUB_OUTPUT
        echo "node-version=$(parse node-version)" >> $GITHUB_OUTPUT
        echo "python-version=$(parse python-version)" >> $GITHUB_OUTPUT
        echo "uv-version=$(parse uv-version)" >> $GITHUB_OUTPUT
