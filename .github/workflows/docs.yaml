name: Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
  push:
    branches:
      - main
    paths:
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: self-hosted

    env:
      IMAGE: registry.cytomine.org/cytomine/documentation
      IMAGE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.IMAGE_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=registry.cytomine.org/docker/moby/buildkit:buildx-stable-1
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["registry.cytomine.org/docker/"]

      - name: Log in to Cytomine registry
        uses: docker/login-action@v4
        with:
          registry: registry.cytomine.org
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./docs/
          file: ./docs/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_SHA }}
            ${{ github.event_name == 'push' && format('{0}:latest', env.IMAGE) || '' }}
          cache-from: type=registry,ref=${{ env.IMAGE }}-build-cache
          cache-to: type=registry,ref=${{ env.IMAGE }}-build-cache,mode=min

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.IMAGE_SHA }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Add preview link
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            The preview link is available at http://pr-${{ github.event.pull_request.number }}.doc.uliege.cytomine.org
