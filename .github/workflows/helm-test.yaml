---
name: Lint and Test Charts

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      REGISTRY_USERNAME:
        required: true
      REGISTRY_TOKEN:
        required: true
permissions: {}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.x
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          config: .github/workflows/kind/kind-config.yaml
          node_image: kindest/node:v1.32.0

      - name: Configure containerd registry credentials
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          NODE=chart-testing-control-plane

          # Add registry credentials directly to containerd config.toml
          printf '\n%s\n%s\n%s\n' \
            '[plugins."io.containerd.grpc.v1.cri".registry.configs."registry.cytomine.org".auth]' \
            "  username = \"${REGISTRY_USERNAME}\"" \
            "  password = \"${REGISTRY_TOKEN}\"" \
            | docker exec -i $NODE tee -a /etc/containerd/config.toml > /dev/null

          # Configure docker.io to mirror to registry.cytomine.org/docker
          docker exec $NODE mkdir -p /etc/containerd/certs.d/docker.io
          printf '%s\n' \
            "server = \"https://registry-1.docker.io\"" \
            "" \
            "[host.\"https://registry.cytomine.org/docker\"]" \
            "  capabilities = [\"pull\", \"resolve\"]" \
            | docker exec -i $NODE tee /etc/containerd/certs.d/docker.io/hosts.toml > /dev/null

          # Configure registry.cytomine.org
          docker exec $NODE mkdir -p /etc/containerd/certs.d/registry.cytomine.org
          printf '%s\n' \
            "server = \"https://registry.cytomine.org\"" \
            "" \
            "[host.\"https://registry.cytomine.org\"]" \
            "  capabilities = [\"pull\", \"resolve\"]" \
            | docker exec -i $NODE tee /etc/containerd/certs.d/registry.cytomine.org/hosts.toml > /dev/null

          # Debug output
          echo "=== containerd config.toml (last 10 lines) ==="
          docker exec $NODE tail -10 /etc/containerd/config.toml
          echo "=== docker.io hosts.toml ==="
          docker exec $NODE cat /etc/containerd/certs.d/docker.io/hosts.toml

          # Restart containerd to pick up changes
          docker exec $NODE systemctl restart containerd
          sleep 5

      - name: Install ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress \
            --create-namespace \
            --set controller.service.type=ClusterIP \
            --wait

      - name: Create Namespace
        run: kubectl create ns cytomine-${{ github.sha }}

      - name: Enforce Restricted Namespace
        run: kubectl label --overwrite ns cytomine-${{ github.sha }} pod-security.kubernetes.io/enforce=restricted
          pod-security.kubernetes.io/enforce-version=latest pod-security.kubernetes.io/warn=restricted
          pod-security.kubernetes.io/warn-version=latest

      - name: Create Harbor Registry secrets
        run: kubectl create secret docker-registry docker-images-pull-secret --namespace=cytomine-${{ github.sha }}
          --docker-server=registry.cytomine.org --docker-username=${{ secrets.REGISTRY_USERNAME }}
          --docker-password=${{ secrets.REGISTRY_TOKEN }}

      - name: Create Docker Registry secrets
        run: kubectl create secret docker-registry docker-images-pull-secret-2 --namespace=cytomine-${{ github.sha }}
          --docker-username=${{ secrets.DOCKERHUB_USERNAME }} --docker-password=${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create Service Account
        run: "kubectl patch serviceaccount default --namespace=cytomine-${{ github.sha }}\
          \ -p '{\"imagePullSecrets\": [{\"name\": \"docker-images-pull-secret\"},{\"\
          name\": \"docker-images-pull-secret-2\"}]}'"

      - name: Run chart-testing (lint and install)
        run: ct lint-and-install --target-branch ${{ github.event.repository.default_branch }}
          --chart-dirs=helm/charts/ --all --namespace=cytomine-${{ github.sha }} ${{ github.ref_name != 'main' && format('--helm-extra-set-args="--set images.core=registry.cytomine.org/cytomine/core:{0} --set images.app_engine=registry.cytomine.org/cytomine/app-engine:{0} --set images.sam=registry.cytomine.org/cytomine/sam:{0} --set images.web_ui=registry.cytomine.org/cytomine/web-ui:{0} --set images.cbir=registry.cytomine.org/cytomine/cbir:{0} --set images.pims=registry.cytomine.org/cytomine/pims:{0} --set images.pims_import=registry.cytomine.org/cytomine/python-client:{0} --set images.e2e_tests=registry.cytomine.org/cytomine/e2e-tests:{0}"', github.sha) || '' }}

      - name: Logs e2e tests results
        if: always()
        run: kubectl --namespace=cytomine-${{ github.sha }} logs e2e-tests

      - name: Export test results
        if: always()
        run: |
          kubectl --namespace=cytomine-${{ github.sha }} apply -f .github/workflows/test-reports/export-pod.yaml
          kubectl --namespace=cytomine-${{ github.sha }} wait --for=condition=Ready pod/export-test-results --timeout=60s || echo "Pod not ready, attempting copy anyway"
          kubectl --namespace=cytomine-${{ github.sha }} cp export-test-results:/reports/build/reports ./test-results/build/ -c exporter || echo "Failed to copy test results from /reports/build/reports"
          kubectl --namespace=cytomine-${{ github.sha }} cp export-test-results:/reports/e2e-tests/build/reports ./test-results/build/ -c exporter || echo "Failed to copy test results from /reports/e2e-tests/build/reports"

      - name: Upload helm test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: helm-test-results
          path: ./test-results
          if-no-files-found: warn
