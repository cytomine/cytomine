{{ if .Values.pims.deploy }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pims
  annotations:
    kube-score/ignore: container-security-context-user-group-id,pod-hostpath
  labels:
    role: pims
    app: {{ include "cytomine.name" . }}
    component: {{ .Release.Name }}-pims
    release: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pims
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        role: pims
        app: pims
        release: {{ .Release.Name }}
      annotations:
        checksum/config: "{{ include (print $.Template.BasePath "/pims/pims-config.yaml") . | sha256sum }}"
    spec:
      serviceAccountName: {{ include "cytomine.serviceAccountName" . }}
      securityContext:
      {{- include "cytomine.podSecurityContext" . | nindent 8 }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: pims-logging
          configMap:
            name: pims-logging
        - name: temp
          emptyDir: {}
        {{- if .Values.pims.datasetImportStorage }}
        - name: import-folder
          {{- .Values.pims.datasetImportStorage | toYaml | nindent 10 }}
        {{- end }}
        {{ if not .Values.pims.imageStorage.storageClassName -}}
        - emptyDir: {}
          name: images
        {{ end }}
        {{ if not .Values.pims.imageStorage.tempImageStorage -}}
        - emptyDir: {}
          name: images-temp
        {{ end }}
      initContainers:
        - name: wait-for-cache
          image: "{{ .Values.images.pims_cache }}"
          securityContext:
          {{- include "cytomine.containerSecurityContext" . | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for pims-cache (Redis) to be ready..."
              until redis-cli -h pims-cache.{{ .Release.Namespace }}.svc.cluster.local -p {{ .Values.pims_cache.port }} ping | grep -q PONG; do
                echo "pims-cache not ready, retrying in 2s..."
                sleep 2
              done
              echo "pims-cache is ready!"
      containers:
        - name: pims
          image: "{{ .Values.images.pims }}"
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - configMapRef:
                name: pims-config
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-core-secret
                  key: password
            - name: CYTOMINE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: core-secret
                  key: IMAGE_SERVER_PUBLIC_KEY
            - name: CYTOMINE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: core-secret
                  key: IMAGE_SERVER_PRIVATE_KEY
            {{- if .Values.pims.datasetImportStorage }}
            - name: DATASET_PATH
              value: "/data/dataset"
            {{- end }}
          volumeMounts:
            - name: images
              mountPath: "/data/images"
            - name: images
              mountPath: "/data/pims"
            - name: images-temp
              mountPath: "/tmp/uploaded"
            - name: pims-logging
              mountPath: /cm_configs/app/logging.yml
              subPath: logging.yml
            - name: temp
              mountPath: /tmp
            {{- if .Values.pims.datasetImportStorage }}
            - mountPath: "/data/dataset"
              name: import-folder
              readOnly: true
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.pims.port }}
          readinessProbe:
            httpGet:
              path: /ims/disk-usage
              port: {{ .Values.pims.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ims/disk-usage
              port: {{ .Values.pims.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          securityContext:
          {{- include "cytomine.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.pims.resources | nindent 12 }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    {{ if .Values.pims.imageStorage.storageClassName -}}
    - metadata:
        name: images
      spec:
        storageClassName: {{ .Values.pims.imageStorage.storageClassName }}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.pims.imageStorage.size }}
    {{ end }}
    {{ if .Values.pims.tempImageStorage.storageClassName -}}
    - metadata:
        name: images-temp
      spec:
        storageClassName: {{ .Values.pims.tempImageStorage.storageClassName }}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.pims.tempImageStorage.size }}
    {{ end }}
{{ end }}
