apiVersion: v1
kind: ConfigMap
metadata:
  name: iam
data:
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_PROXY_HEADERS: xforwarded
  KC_HTTP_RELATIVE_PATH: /iam
  KC_HEALTH_ENABLED: "true"
  KC_HTTP_MANAGEMENT_PORT: "9000"
  KC_HTTP_MANAGEMENT_ENABLE: "true"
  KC_HTTP_ENABLED: "true"
  KC_HTTP_PORT: "{{ .Values.iam.port }}"
  KC_HOSTNAME_STRICT: "false"
  KC_HOSTNAME_STRICT_HTTPS: "false"
  KC_HOSTNAME_STRICT_BACKCHANNEL: "true"
  KC_FEATURES: token-exchange
  KC_DB: postgres
  KC_DB_USERNAME: iam
  KC_DB_URL_DATABASE: iam
  KC_DB_URL_HOST: postgres-iam.{{ .Release.Namespace }}.svc.cluster.local
  KC_DB_URL_PORT: "5432"
  KC_HOSTNAME: "{{ .Values.global.domainName }}"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iam-client-config
data:
  config.json: {{ tpl (.Files.Get "configs/iam/config.json") . | quote }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iam-user-config
data:
  config.json: |-
    {
      "username": "admin",
      "enabled": true,
      "emailVerified": true,
      "email": "admin@cytomine.org",
      "firstName": "Admin",
      "lastName": "Admin"
    }
