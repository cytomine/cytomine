---
name: Docker push PR

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      REGISTRY_USERNAME:
        required: true
      REGISTRY_TOKEN:
        required: true
      PRIVATE_REPO_TOKEN:
        required: true
jobs:
  build-push:
    runs-on: self-hosted

    strategy:
      fail-fast: true
      matrix:
        image:
          - name: app-engine
            context: .
            dockerfile_location: app-engine
            target: production
          - name: cbir
            target: production
          - name: core
            target: production
            context: .
            dockerfile_location: core
          - name: iam
            target: production
          - name: pims
            context: .
            dockerfile_location: pims
            target: production
          - name: sam
            target: production
          - name: web-ui
          - name: python-client
            context: clients/python
          - name: e2e-tests
            context: .
            dockerfile_location: e2e-tests
          - name: repository
            context: .
            dockerfile_location: repository
          - name: app-engine-tasks-runner
            context: .
            dockerfile_location: app-engine/task-runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=registry.cytomine.org/docker/moby/buildkit:buildx-stable-1
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["registry.cytomine.org/docker/"]
      - name: Log in to Cytomine registry
        uses: docker/login-action@v4
        with:
          registry: registry.cytomine.org
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Log in to Docker registry
        uses: docker/login-action@v4
        if: github.ref_name == 'main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define deployment name
        run: echo "DEPLOYMENT_NAME=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context || matrix.image.name }}
          file: ./${{ matrix.image.dockerfile_location || matrix.image.context || matrix.image.name }}/Dockerfile
          push: true
          tags: |
            registry.cytomine.org/cytomine/${{ matrix.image.name }}:${{ env.DEPLOYMENT_NAME }}
            ${{ github.ref_name == 'main' && format('cytomine/{0}:latest', matrix.image.name) || '' }}
          cache-from: type=registry,ref=registry.cytomine.org/cytomine/${{ matrix.image.name }}-build-cache
          cache-to: type=registry,ref=registry.cytomine.org/cytomine/${{ matrix.image.name }}-build-cache,mode=min
          allow: network.host
          network: host
          target: ${{ matrix.image.target || '' }}
          secrets: |                       
            github_token=${{ secrets.PRIVATE_REPO_TOKEN }}
          build-args: |                    
            GITHUB_TOKEN=${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: registry.cytomine.org/cytomine/${{ matrix.image.name }}:${{ env.DEPLOYMENT_NAME }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
