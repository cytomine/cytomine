name: SAM

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    working-directory: ./sam

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Set up the repository
        uses: actions/checkout@v6.0.2

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.versions.outputs.uv-version }}

      - name: Run tests
        run: uv run pytest
