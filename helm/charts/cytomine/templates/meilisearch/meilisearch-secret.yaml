{{ if .Values.meilisearch.deploy }}
apiVersion: v1
kind: Secret
metadata:
  name: meilisearch-secret
type: Opaque
data:
{{- $secretObj := (lookup "v1" "Secret" .Release.Namespace "meilisearch-secret") | default dict }}
{{- $secretData := (get $secretObj "data") | default dict }}
{{- $secret := (get $secretData "masterKey") | default (randAlphaNum 64 | b64enc) }}
  masterKey: {{ $secret | quote }}
{{ end }}
