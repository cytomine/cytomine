apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium
  labels:
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenium
  template:
    metadata:
      labels:
        app: selenium
    spec:
      containers:
        - name: selenium
          image: "{{ .Values.images.selenium }}"
          ports:
          - name: http
            containerPort: 4444
---
apiVersion: v1
kind: Service
metadata:
  name: selenium
  annotations:
    "helm.sh/hook": test
spec:
  selector:
    app: selenium
  ports:
    - name: http
      port: 4444
      protocol: TCP
