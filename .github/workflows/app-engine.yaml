name: App Engine

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    working-directory: ./app-engine

jobs:
  validate-json-schema:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: "16"

      - name: Install dependencies
        run: >-
          npm install -g
          ajv-cli@5.0.0
          ajv-formats@2.1.1
          ajv-formats-draft2019@1.6.1

      - name: Validate JSON schema
        env:
          SCHEMA_PATH: ./src/main/resources/schemas/tasks/task.v0.json
        run: >-
          ajv compile
          -s ${{ env.SCHEMA_PATH }}
          -c ajv-formats
          -c ajv-formats-draft2019
          --spec=draft2019
          --strict=false
          --all-errors

  validate-openapi:
    runs-on: ubuntu-latest
    container:
      image: registry.cytomine.org/docker/redocly/cli:1.10.6
      # https://stackoverflow.com/a/68761652
      options: --user root
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate OpenAPI specifications
        run: 'redocly lint src/test/resources/spec/api/openapi_spec.v0.1.0.yml'
