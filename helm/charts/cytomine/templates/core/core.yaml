{{ if .Values.core.deploy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  annotations:
    kube-score/ignore: pod-probes,container-security-context-user-group-id
  labels:
    role: core
    app: core
    component: {{ .Release.Name }}-core
    release: {{ .Release.Name }}
spec:
  progressDeadlineSeconds: 1200
  replicas: 1
  selector:
    matchLabels:
      app: core
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        role: core
        app: core
        release: {{ .Release.Name }}
      annotations:
        checksum/config: "{{ include (print $.Template.BasePath "/core/core-config.yaml") . | sha256sum }}"
    spec:
      securityContext:
      {{- include "cytomine.podSecurityContext" . | nindent 8 }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: core-config
        secret:
          secretName: core-config
      - name: core-localtime
        configMap:
          name: localtime
      - name: temp
        emptyDir: {}
      containers:
        - name: core
          image: "{{ .Values.images.core }}"
          securityContext:
          {{- include "cytomine.containerSecurityContext" . | nindent 12 }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: POSTGIS_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-core-secret
                  key: password
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: password
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin-iam-secret
                  key: password
          envFrom:
            - configMapRef:
                name: core-env
            - secretRef:
                name: core-secret
          volumeMounts:
            - name: core-config
              mountPath:  /cm_configs/app/application.yml.sample
              subPath: application.yml.sample
            - name: core-config
              mountPath:  /cm_configs/app/logback.xml
              subPath: logback.xml
            - name: core-localtime
              mountPath: /etc/localtime
              subPath: Europe
            - name: temp
              mountPath: /tmp
            - name: temp
              mountPath: /app
            - name: temp
              mountPath: /javamelody-core
          ports:
            - name: http
              containerPort: {{ .Values.core.port }}
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /server/ping
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /server/ping
              port: 8080
            initialDelaySeconds: 20
            failureThreshold: 40
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /server/ping
              port: 8080
            initialDelaySeconds: 20
            failureThreshold: 40
            timeoutSeconds: 5
      initContainers:
        - name: wait-for-postgis
          image: "{{ .Values.images.postgis }}"
          securityContext:
          {{- include "cytomine.containerSecurityContext" . | nindent 12 }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-core-secret
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for postgis to be ready..."
              until pg_isready -h postgis.{{ .Release.Namespace }}.svc.cluster.local -p {{ .Values.postgresql.port }} -U {{ .Values.postgresql.user }}; do
                echo "postgis not ready, retrying in 2s..."
                sleep 2
              done
              echo "postgis is ready!"
        - name: wait-for-mongodb
          image: "{{ .Values.images.curl }}"
          securityContext:
          {{- include "cytomine.containerSecurityContext" . | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for mongodb to be ready..."
              until nc -z mongodb.{{ .Release.Namespace }}.svc.cluster.local {{ .Values.mongodb.port }}; do
                echo "mongodb not ready, retrying in 2s..."
                sleep 2
              done
              echo "mongodb is ready!"
        - name: wait-for-repository
          image: "{{ .Values.images.curl }}"
          securityContext:
          {{- include "cytomine.containerSecurityContext" . | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for repository to be ready..."
              until curl -sf http://repository.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.repository.port }}/ping; do
                echo "repository not ready, retrying in 2s..."
                sleep 2
              done
              echo "repository is ready!"
        - name: core-init
          image: "{{ .Values.images.core }}"
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          securityContext:
          {{- include "cytomine.containerSecurityContext" . | nindent 12 }}
          command:
            - /bin/bash
            - -c
            - >
              set -x;
              cp -r /app/* /fix/;
          volumeMounts:
            - name: temp
              mountPath: /fix/
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{ end }}
